<!doctype html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
  <body>
    <aside th:fragment="sidebar" class="sidebar">
      <div class="logo">
        <div class="logo-circle">BA</div>
        <div>
          <div class="logo-title">Bilabonnement</div>
          <div class="logo-subtitle">.dk - Intern platform</div>
        </div>
      </div>
      <div class="role-section">
        <div class="role-label">AKTIV ROLLE</div>
        <div
          class="role-active"
          th:text="${activeRole != null ? activeRole : 'DAMAGE'}"
        >
          DAMAGE
        </div>
      </div>
      <nav>
        <ul>
          <li th:classappend="${activeMenu} == 'registration' ? 'active'">
            <a href="/rental-agreement" th:href="@{/rental-agreement}"
              >Dataregistrering</a
            >
          </li>
          <li th:classappend="${activeMenu} == 'repairs' ? 'active'">
            <a href="/damage-registration" th:href="@{/damage-registration}"
              >Skade &amp; Reparation</a
            >
          </li>
          <li th:classappend="${activeMenu} == 'business' ? 'active'">
            <a href="/business-development" th:href="@{/business-development}"
              >Forretningsudvikling</a
            >
          </li>
        </ul>
      </nav>
      <div class="footer"></div>
    </aside>
  </body>
</html>
